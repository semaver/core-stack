version: 2
updates:
  # npm dependencies (root monorepo manifest + workspaces)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch routine dev-tooling bumps into a single PR to avoid PR-scatter.
      development-dependencies:
        dependency-type: development
      # Runtime deps grouped separately so production changes stay visible.
      production-dependencies:
        dependency-type: production
    ignore:
      # TypeScript 7.0 (native Go compiler) breaks the rollup build:
      # "@rollup/plugin-typescript@12" hits `TypeError: Cannot read properties of
      # undefined (reading 'ES2015')" — the plugin isn't compatible with the TS7
      # internal ScriptTarget API. Stay on 6.x until the toolchain supports TS7.
      - dependency-name: "typescript"
        versions: [">=7.0.0"]
    labels:
      - dependencies

  # Keep the GitHub Actions used by our workflows up to date (and pinned).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
