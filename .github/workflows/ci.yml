name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, lint, test & package checks
    runs-on: ubuntu-latest
    steps:
      # Runtime hardening (audit mode first; switch to block + allowlist once egress is known).
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Node version comes from .nvmrc (v24.18.0) — the toolchain requires Node 24.
      # Node 20 breaks the babel build (ERR_REQUIRE_ESM).
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (Yarn Berry 4.17.1)
        run: corepack enable

      - name: Install (immutable — lockfile must be up to date)
        run: yarn install --immutable

      - name: Generate index barrels
        run: yarn run index

      - name: Build (rollup — both packages)
        run: yarn run build

      - name: Lint
        run: yarn run lint

      - name: Test (expect 179/179 across 35 suites) + lcov for coverage upload
        run: yarn run test:all --coverageReporters=lcov --coverageReporters=text

      # --- Package-correctness gates (dual ESM/CJS). Run AFTER build. ---
      - name: publint (@semaver/core)
        run: yarn dlx publint@latest run ./packages/core
      - name: publint (@semaver/reflector)
        run: yarn dlx publint@latest run ./packages/reflector

      # Package-correctness gate: attw must resolve types cleanly in all module modes
      # (node10, node16-cjs, node16-esm, bundler). Blocking — the dual .d.ts/.d.cts split
      # keeps this green; a regression here should fail CI.
      - name: attw — are-the-types-wrong (@semaver/core)
        run: yarn dlx @arethetypeswrong/cli@latest --pack ./packages/core
      - name: attw — are-the-types-wrong (@semaver/reflector)
        run: yarn dlx @arethetypeswrong/cli@latest --pack ./packages/reflector

      # Bundle-size budget (min+brotli per export). Blocking — verifies tree-shaking holds.
      - name: size-limit
        run: yarn run size

      # Dead-code / unused-deps report. Non-blocking for now (informational) —
      # promote to blocking once the report stays clean.
      - name: knip (unused files/deps/exports)
        continue-on-error: true
        run: yarn run knip

      # Coverage upload is opt-in: only runs once CODECOV_TOKEN is configured.
      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
      - name: Enable Corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Validate PR commits
        run: yarn commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

